name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build vanilla-js
        working-directory: examples/vanilla-js
        run: npm ci && npm run build

      - name: Build react
        working-directory: examples/react
        run: npm ci && npm run build

      - name: Build vue
        working-directory: examples/vue
        run: npm ci && npm run build

      - name: Build svelte
        working-directory: examples/svelte
        run: npm ci && npm run build

      - name: Build angular
        working-directory: examples/angular
        run: npm ci && npm run build

      - name: Build nextjs
        working-directory: examples/nextjs
        run: npm ci && npm run build

      - name: Assemble _site
        run: |
          mkdir -p _site/vanilla-js _site/react _site/vue _site/svelte _site/angular _site/nextjs
          touch _site/.nojekyll
          cp index.html _site/
          cp -r examples/vanilla-js/dist/. _site/vanilla-js/
          cp -r examples/react/dist/. _site/react/
          cp -r examples/vue/dist/. _site/vue/
          cp -r examples/svelte/dist/. _site/svelte/
          cp -r examples/angular/dist/angular/browser/. _site/angular/
          cp -r examples/nextjs/out/. _site/nextjs/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
